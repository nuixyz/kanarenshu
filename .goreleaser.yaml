version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/kanarenshu
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - arm64
      - amd64

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  use: github
  abbrev: 7
  groups:
    - title: "What's Changed"
      regexp: ".*"
  format: "{{ .Message }} in {{ .SHA }} by {{ with .Author.Username }}@{{ . }}{{ else }}{{ .Author.Name }}{{ end }}"
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-
    ---
    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
